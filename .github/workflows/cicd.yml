name: Deploy Node Application v2

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t harshmhatre28/text-to-image-generator-ai-saas-web-appnodejs-app:latest .

      - name: Push Docker Image
        run: docker push harshmhatre28/text-to-image-generator-ai-saas-web-appnodejs-app:latest


  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull image from Docker Hub
        run: docker pull harshmhatre28/text-to-image-generator-ai-saas-web-appnodejs-app:latest

      - name: Delete old container
        run: docker rm -f text-to-image-generator-ai-saas-web-appnodejs-app-container || true

      - name: Run Docker container
        run: docker run -d -p 4000:4000 --name text-to-image-generator-ai-saas-web-appnodejs-app-container -e MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} harshmhatre28/text-to-image-generator-ai-saas-web-appnodejs-app:latest
